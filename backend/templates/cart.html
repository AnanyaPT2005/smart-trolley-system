<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    .container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .left, .right {
      width: 50%;
    }

    .box {
      border: 1px solid black;
      padding: 15px;
    }

    #reader {
      width: 250px;
      height: 250px;
      border: 1px solid gray;
    }
  </style>
</head>

<body>

<h2>User Shopping Page</h2>

<p><b>Session ID:</b> {{ session_id }}</p>
<p><b>Trolley ID:</b> {{ trolley_id }}</p>

<div class="container">

  <!-- LEFT -->
  <div class="left box">

    <h3>Scanner</h3>

    <div id="reader"></div>

    <p><b>Scanned Barcode:</b></p>
    <p id="barcodeResult">None</p>

    <input type="text" id="barcodeInput" placeholder="Enter barcode">
    <button onclick="fetchProduct()">Check Product</button>

    <p id="productResult"></p>

    <!-- ✅ FIXED -->
    <button onclick="addItem()">Add to Cart</button>

  </div>

  <!-- RIGHT -->
  <div class="right box">

    <h3>Cart Items</h3>

    <table border="1" width="100%">
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cartTable"></tbody>
      
    </table>
    <p><b>Total: Rs.<span id="totalPrice">0</span></b></p>
<button onclick="goToBilling()">Go to Billing</button>
<p id="billingMsg"></p>

  </div>
  

</div>

<script>
let lastScanned = null;
let currentBarcode = null;

// 📷 scanner
function onScanSuccess(decodedText) {
  if (decodedText === lastScanned) return;

  lastScanned = decodedText;

  document.getElementById("barcodeResult").innerText = decodedText;

  // ✅ auto-fill input
  document.getElementById("barcodeInput").value = decodedText;

  currentBarcode = decodedText;
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess
    );
  }
});

// 🔍 fetch product
async function fetchProduct() {
  const barcode = document.getElementById("barcodeInput").value.trim();

  if (!barcode) return;

  const res = await fetch("/get-product/" + barcode);
  const data = await res.json();

  if (res.ok) {
    currentBarcode = barcode;

    document.getElementById("productResult").innerText =
      data.name + " - Rs." + data.price;
  } else {
    document.getElementById("productResult").innerText =
      "Product not found";
  }
}

// ➕ ADD ITEM (FIXED)
async function addItem() {
  if (!currentBarcode) {
    alert("Scan or enter barcode first");
    return;
  }

  await fetch("/add-item", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ barcode: currentBarcode })
  });

  loadCartItems();
}



async function loadCartItems() {
  const res = await fetch("/get-items/{{ session_id }}");
  const items = await res.json();

  const table = document.getElementById("cartTable");
  table.innerHTML = "";

  let total = 0;  // 🔥 total variable

  items.forEach(item => {
    const row = document.createElement("tr");

    const itemTotal = item.price * item.quantity;
    total += itemTotal;

    row.innerHTML = `
      <td>${item.name}</td>
      <td>Rs.${item.price}</td>
      <td>
        <button onclick="updateQty('${item.barcode}', 'decrease')">-</button>
        ${item.quantity}
        <button onclick="updateQty('${item.barcode}', 'increase')">+</button>
      </td>
      <td>
        <button onclick="deleteItem('${item.barcode}')">Delete</button>
      </td>
    `;

    table.appendChild(row);
  });

  // ✅ update total in UI
  document.getElementById("totalPrice").innerText = total;
}

async function updateQty(barcode, action) {
  await fetch("/update-quantity", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      barcode: barcode,
      action: action
    })
  });

  loadCartItems(); // refresh table
}

async function deleteItem(barcode) {
  await fetch("/delete-item", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ barcode: barcode })
  });

  loadCartItems(); // refresh table
}

async function goToBilling() {
  const res = await fetch("/go-to-billing", {
    method: "POST"
  });

  const data = await res.json();
  document.getElementById("billingMsg").innerText = data.msg;
}

setInterval(async () => {
  const res = await fetch("/check-session-status");
  const data = await res.json();

  if (data.status === "completed") {
    alert("Billing completed!");
    window.location.href = "/user";
  }
}, 3000); // check every 3 sec

// load on page start
loadCartItems();
</script>

</body>
</html>
