
<!DOCTYPE html>
<html>
<head>
  <style>
    .session-box {
      border: 1px solid black;
      margin: 10px;
      padding: 10px;
    }

    .header {
      cursor: pointer;
      font-weight: bold;
    }

    .items {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Employee Billing Dashboard</h2>

<div id="container"></div>

<hr>

<div id="paymentSection" style="display:none;">

  <h3>Payment</h3>

  <p>Total Amount: <b id="amount"></b></p>

  <select id="method" onchange="handleMethod()">
    <option value="Cash">Cash</option>
    <option value="UPI">UPI</option>
  </select>

  <div id="upi-box" style="display:none;">
    <p>Scan & Pay:</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=demo@upi" />
  </div>

  <br>
  <button onclick="pay()">Pay Now</button>

  <p id="paymentMsg"></p>

</div>

<script>
async function loadData() {
  const res = await fetch("/get-employee-data");
  const data = await res.json();

  if (res.status === 403) {
    alert("Unauthorized");
    window.location.href = "/";
    return;
  }

  const container = document.getElementById("container");
  container.innerHTML = "";

  data.sessions.forEach(session => {

    const billingSession = data.billing_data.find(
      s => s.session_id === session.session_id
    );

    const div = document.createElement("div");
    div.className = "session-box";

    div.innerHTML = `
      <div class="header" onclick="toggle('${session.session_id}')">
        ${session.trolley_id.toUpperCase()}
        ${session.status === "billing" ? "(Ready for Billing)" : ""}
        ▼
      </div>

      <div class="items" id="items-${session.session_id}">
        ${
          session.status === "billing"
          ? renderItems(billingSession)
          : "<p>Not ready for billing</p>"
        }
      </div>
    `;

    container.appendChild(div);
  });
}

function renderItems(session) {
  if (!session) return "<p>No items</p>";

  return `
    <table border="1" width="100%">
      <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>

      ${session.items.map(item => `
        <tr>
          <td>${item.name}</td>
          <td>Rs.${item.price}</td>
          <td>${item.qty}</td>
          <td>Rs.${item.total}</td>
        </tr>
      `).join("")}
    </table>

    <p><b>Total: Rs.${session.subtotal}</b></p>

   <button onclick="startBilling('${session.session_id}', ${session.subtotal})">
  Bill
</button>
    <p id="msg-${session.session_id}"></p>
  `;
}

function toggle(id) {
  const el = document.getElementById("items-" + id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

async function bill(session_id) {
  const res = await fetch("/confirm-bill", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ session_id })
  });

  const data = await res.json();

  document.getElementById("msg-" + session_id).innerText = data.msg;

  loadData();
}

let selectedSession = null;
//billing
function startBilling(session_id, total) {
  selectedSession = session_id;

  document.getElementById("paymentSection").style.display = "block";
  document.getElementById("amount").innerText = "Rs. " + total;
}



function startBilling(session_id, total) {
  selectedSession = session_id;

  document.getElementById("paymentSection").style.display = "block";
  document.getElementById("amount").innerText = "Rs. " + total;
}

function handleMethod() {
  const method = document.getElementById("method").value;

  document.getElementById("upi-box").style.display =
    method === "UPI" ? "block" : "none";
}

async function pay() {
  const method = document.getElementById("method").value;

  const res = await fetch("/payment-success", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      session_id: selectedSession,
      method: method
    })
  });

  const data = await res.json();

  document.getElementById("paymentMsg").innerText = data.msg;

  // ✅ refresh billing list
  loadData();

  // hide payment section
  document.getElementById("paymentSection").style.display = "none";
}

loadData();
</script>

</body>
</html>
